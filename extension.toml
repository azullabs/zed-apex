id = "apex"
name = "Apex"
version = "0.1.0"
schema_version = 1
authors = ["Apex Extension Contributors"]
description = "Salesforce Apex, SOQL, and SOSL language support for Zed"
repository = "https://github.com/azullabs/zed-apex"

[grammars.apex]
repository = "file://vendor/tree-sitter-sfapex"
path = "apex"

[grammars.soql]
repository = "file://vendor/tree-sitter-sfapex"
path = "soql"

[grammars.sosl]
repository = "file://vendor/tree-sitter-sfapex"
path = "sosl"

[language_servers.apex-jorje]
name = "Apex Language Server"
languages = ["Apex"]
